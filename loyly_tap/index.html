<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Löyly Tap" />
  <meta name="theme-color" content="#121212" />
  <title>Löyly Tap</title>

  <!-- Match chan.fi/ai typography -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet" />

  <!-- Use the SAME CSS as chan.fi/ai -->
  <link rel="stylesheet" href="style.css" />

  <!-- Small page-specific overrides (kept minimal) -->
  <style>
    /* Keep the same container look; just allow a bit more space for the square game */
    .container { max-width: 600px; }

    /* Game square: always centered, always fits container */
    .gameWrap{
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 8px;              /* matches your container radius vibe */
      overflow: hidden;
      margin-top: 14px;
      border: 1px solid #333;
      background: #0b0b0b;
    }

    canvas{
      width: 100%;
      height: 100%;
      display: block;

      /* stop iOS scroll/zoom gestures while tapping */
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }

    /* Overlay panel styled to match your AI boxes */
    .overlay{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 14px;
      background: rgba(0,0,0,0.55);
    }
    .overlay.hidden{ display:none; }

    .panel{
      width: 100%;
      max-width: 520px;
      background: #1e1e1e;             /* same as container */
      border: 1px solid #333;
      border-radius: 8px;
      padding: 14px;
      text-align: left;
      box-shadow: 0 4px 6px rgba(0,0,0,0.5);  /* matches your container shadow */
    }
    .panel h2{
      font-size: 1.3em;
      margin-bottom: 8px;
      color: #e0e0e0;
    }
    .panel p{
      color: #9e9e9e;
      margin-bottom: 12px;
      line-height: 1.5;
    }

    /* Use the same “grey button” style as your HOME button */
    .gameBtn{
      display:inline-block;
      padding: 8px 14px;
      background: #808080;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-weight: bold;
      font-size: 0.95em;
      cursor: pointer;
      transition: background 0.2s ease-in-out, color 0.2s ease-in-out;
    }
    .gameBtn:hover,
    .gameBtn:active{
      background: #666666;
      color: #42a5f5;
    }

    .hud{
      margin-top: 10px;
      display:flex;
      justify-content:center;
      gap: 18px;
      color:#9e9e9e;
      font-size: 1.05em;
    }
    .hud strong{ color:#e0e0e0; }

    /* Best score centered and SAME font size */
    .bestLine{
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid #333;
      color:#9e9e9e;
      font-size: 1.05em;
      text-align:center;
    }
    .bestLine strong{ color:#e0e0e0; font-weight:700; }

    /* Scroll lock */
    body.locked{
      position: fixed;
      overflow: hidden;
      width: 100%;
      left: 0;
      right: 0;
    }
  </style>
</head>

<body>
  <header>
    <div class="container header-container">
      <h1>Löyly Tap</h1>
      <p style="color:#9e9e9e; margin-top:8px;">
        Tap as fast as you can for <strong style="color:#e0e0e0;">10 seconds</strong>. Your best score is saved on this device.
      </p>

      <div class="hud" aria-live="polite">
        <div>Time: <strong id="timeLeft">10.0s</strong></div>
        <div>Score: <strong id="score">0</strong></div>
      </div>

      <div class="gameWrap">
        <canvas id="c" width="900" height="900" aria-label="Tap to splash löyly"></canvas>

        <div class="overlay" id="overlay">
          <div class="panel">
            <h2 id="overlayTitle">Ready?</h2>
            <p id="overlayMsg">Press Start, then tap the stones as fast as you can for 10 seconds.</p>
            <div style="display:flex; justify-content:flex-end;">
              <button class="gameBtn" id="mainBtn">Start</button>
            </div>
          </div>
        </div>
      </div>

      <div class="bestLine">Best: <strong id="bestScore">0</strong></div>
    </div>
  </header>

  <footer>
    <div class="container">
      <p>&copy; <span id="year"></span> Kai Chan. All rights reserved.</p>
    </div>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    (() => {
      const ROUND_SECONDS = 10;
      const STORAGE_KEY_BEST = "loylyTapBestScore_v3";

      const ASSET_STONES = "stones.jpg";
      const ASSET_LADLE  = "ladle.png";

      const timeLeftEl = document.getElementById("timeLeft");
      const scoreEl = document.getElementById("score");
      const bestScoreEl = document.getElementById("bestScore");

      const overlay = document.getElementById("overlay");
      const overlayTitle = document.getElementById("overlayTitle");
      const overlayMsg = document.getElementById("overlayMsg");
      const mainBtn = document.getElementById("mainBtn");

      const canvas = document.getElementById("c");
      const ctx = canvas.getContext("2d");

      function clamp(n,a,b){ return Math.max(a, Math.min(b,n)); }
      function rnd(a,b){ return a + Math.random()*(b-a); }

      function resizeCanvasToDisplaySize() {
        const dpr = Math.max(1, Math.min(2.5, window.devicePixelRatio || 1));
        const rect = canvas.getBoundingClientRect();
        const w = Math.floor(rect.width * dpr);
        const h = Math.floor(rect.height * dpr);
        if (canvas.width !== w || canvas.height !== h) {
          canvas.width = w;
          canvas.height = h;
        }
        return { dpr, w, h };
      }

      function loadImage(src){
        return new Promise((resolve) => {
          const img = new Image();
          img.onload = () => resolve({ ok:true, img });
          img.onerror = () => resolve({ ok:false, img:null });
          img.src = src;
        });
      }

      let stonesImg = null;
      let ladleImg = null;
      let assetsOk = { stones:false, ladle:false };

      function getBest(){
        const raw = localStorage.getItem(STORAGE_KEY_BEST);
        const n = raw ? Number(raw) : 0;
        return Number.isFinite(n) && n >= 0 ? Math.floor(n) : 0;
      }
      function setBest(n){
        localStorage.setItem(STORAGE_KEY_BEST, String(Math.floor(n)));
        bestScoreEl.textContent = String(Math.floor(n));
      }

      const State = { READY:"READY", RUNNING:"RUNNING", RESULT:"RESULT" };
      let state = State.READY;

      let score = 0;
      let startTs = 0;
      let lastTapTs = 0;

      // Flick-up ladle
      let ladleKick = 0;
      let ladleKickVel = 0;

      // Bigger splash particles
      const droplets = [];
      const steams = [];
      const rings = [];

      // Scroll lock
      let savedScrollY = 0;
      function lockScroll(){
        savedScrollY = window.scrollY || 0;
        document.body.classList.add("locked");
        document.body.style.top = `-${savedScrollY}px`;
      }
      function unlockScroll(){
        document.body.classList.remove("locked");
        const top = document.body.style.top;
        document.body.style.top = "";
        const y = top ? -parseInt(top, 10) : savedScrollY;
        window.scrollTo(0, y || 0);
      }

      function setOverlay(mode, data){
        overlay.classList.remove("hidden");

        if (mode === State.READY){
          overlayTitle.textContent = "Ready?";
          overlayMsg.textContent = "Press Start, then tap the stones as fast as you can for 10 seconds.";
          mainBtn.textContent = "Start";
        }

        if (mode === State.RESULT){
          overlayTitle.textContent = "Time!";
          overlayMsg.textContent = data.message;
          mainBtn.textContent = "Play again";
        }

        if (mode === State.RUNNING){
          overlay.classList.add("hidden");
        }
      }

      function startRound(){
        score = 0;
        scoreEl.textContent = "0";
        startTs = performance.now();
        timeLeftEl.textContent = ROUND_SECONDS.toFixed(1) + "s";
        lastTapTs = 0;

        droplets.length = 0;
        steams.length = 0;
        rings.length = 0;
        ladleKick = 0;
        ladleKickVel = 0;

        state = State.RUNNING;
        lockScroll();
        setOverlay(State.RUNNING);
      }

      function endRound(){
        timeLeftEl.textContent = "0.0s";
        unlockScroll();

        const best = getBest();
        if (score > best){
          setBest(score);
          setOverlay(State.RESULT, { message: `New best score: ${score}. Nice.` });
        } else {
          setOverlay(State.RESULT, { message: `You scored ${score}. Your best is ${best}.` });
        }

        state = State.RESULT;
      }

      function updateTimer(){
        if (state !== State.RUNNING) return;
        const elapsed = (performance.now() - startTs) / 1000;
        const remaining = clamp(ROUND_SECONDS - elapsed, 0, ROUND_SECONDS);
        timeLeftEl.textContent = remaining.toFixed(1) + "s";
        if (remaining <= 0) endRound();
      }

      function drawCover(img, w, h){
        const iw = img.width, ih = img.height;
        const s = Math.max(w / iw, h / ih);
        const dw = iw * s, dh = ih * s;
        const dx = (w - dw) / 2;
        const dy = (h - dh) / 2;
        ctx.drawImage(img, dx, dy, dw, dh);
      }

      function drawFallback(w,h){
        const g = ctx.createLinearGradient(0,0,0,h);
        g.addColorStop(0, "#0b0b0b");
        g.addColorStop(1, "#050505");
        ctx.fillStyle = g;
        ctx.fillRect(0,0,w,h);
      }

      function spawnSplash(x,y, strength){
        // bigger impact ring
        rings.push({
          x, y,
          born: performance.now(),
          life: 320 + strength*180,
          r0: 18,
          r1: 120 + strength*120
        });

        // bigger droplets
        const n = Math.floor(28 + strength*34);
        for (let i=0;i<n;i++){
          const a = rnd(-Math.PI*0.95, -Math.PI*0.05);
          const sp = rnd(3.6, 9.6) * (1.0 + strength*1.1);
          droplets.push({
            x, y,
            vx: Math.cos(a)*sp + rnd(-1.4,1.4),
            vy: Math.sin(a)*sp,
            r: rnd(3.8, 9.8),
            life: rnd(600, 1050),
            born: performance.now()
          });
        }

        // more steam
        const sn = Math.floor(4 + strength*4);
        for (let i=0;i<sn;i++){
          steams.push({
            x: x + rnd(-34,34),
            y: y + rnd(-14,14),
            vx: rnd(-0.24,0.24),
            vy: rnd(-0.78,-0.40),
            r: rnd(26, 52),
            life: rnd(950, 1650),
            born: performance.now()
          });
        }

        ladleKickVel += 1.05 + strength*0.90;
      }

      function drawParticles(now){
        for (let i=rings.length-1;i>=0;i--){
          const r = rings[i];
          const t = (now - r.born) / r.life;
          if (t >= 1){ rings.splice(i,1); continue; }
          const rr = r.r0 + (r.r1 - r.r0) * t;
          ctx.save();
          ctx.globalAlpha = (1 - t) * 0.42;
          ctx.lineWidth = 3;
          ctx.strokeStyle = "rgba(200,230,255,0.9)";
          ctx.beginPath();
          ctx.arc(r.x, r.y, rr, 0, Math.PI*2);
          ctx.stroke();
          ctx.restore();
        }

        for (let i=droplets.length-1;i>=0;i--){
          const d = droplets[i];
          const age = now - d.born;
          const t = age / d.life;
          if (t >= 1){ droplets.splice(i,1); continue; }

          d.x += d.vx;
          d.y += d.vy;
          d.vy += 0.25;
          d.vx *= 0.992;

          const alpha = 1 - t;
          ctx.save();
          ctx.globalAlpha = 0.78 * alpha;
          const g = ctx.createRadialGradient(d.x-d.r*0.25, d.y-d.r*0.25, 1, d.x, d.y, d.r*2.2);
          g.addColorStop(0, "rgba(255,255,255,0.65)");
          g.addColorStop(0.25, "rgba(170,220,255,0.45)");
          g.addColorStop(1, "rgba(120,170,210,0)");
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.arc(d.x, d.y, d.r*1.25, 0, Math.PI*2);
          ctx.fill();
          ctx.restore();
        }

        for (let i=steams.length-1;i>=0;i--){
          const s = steams[i];
          const age = now - s.born;
          const t = age / s.life;
          if (t >= 1){ steams.splice(i,1); continue; }

          s.x += s.vx;
          s.y += s.vy;
          s.r += 0.07;

          const alpha = (1 - t) * 0.60;
          ctx.save();
          ctx.globalAlpha = alpha;
          const g = ctx.createRadialGradient(s.x, s.y, 1, s.x, s.y, s.r);
          g.addColorStop(0, "rgba(255,255,255,0.22)");
          g.addColorStop(1, "rgba(255,255,255,0)");
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
          ctx.fill();
          ctx.restore();
        }
      }

      function updateLadleSpring(){
        ladleKickVel -= ladleKick * 0.26;
        ladleKickVel *= 0.78;
        ladleKick += ladleKickVel * 0.06;
        ladleKick = clamp(ladleKick, 0, 1.2);
        if (ladleKick < 0.001) ladleKick = 0;
      }

      function drawLadle(w,h){
        const baseX = w * 0.76;
        const baseY = h * 0.28;

        const kick = ladleKick;
        const rot = -0.55 + kick * 0.55;
        const tx  = -kick * (w * 0.020);
        const ty  = -kick * (h * 0.055);
        const sc  = 1 + kick * 0.06;
        const size = Math.min(w,h) * 0.56;

        ctx.save();
        ctx.translate(baseX + tx, baseY + ty);
        ctx.rotate(rot);
        ctx.scale(sc, sc);

        if (assetsOk.ladle && ladleImg){
          ctx.shadowColor = "rgba(0,0,0,0.45)";
          ctx.shadowBlur = 16;
          ctx.drawImage(ladleImg, -size*0.58, -size*0.18, size, size);
        }

        ctx.restore();
      }

      function drawHUD(w,h){
        if (state !== State.RUNNING) return;
        ctx.save();
        ctx.globalAlpha = 0.95;
        ctx.fillStyle = "rgba(255,255,255,0.92)";
        ctx.font = `${Math.floor(h*0.045)}px Roboto, system-ui, -apple-system, Segoe UI, Arial`;
        ctx.textAlign = "left";
        ctx.fillText(`Score: ${score}`, w*0.04, h*0.10);
        ctx.textAlign = "right";
        ctx.fillText(`Time: ${timeLeftEl.textContent}`, w*0.96, h*0.10);
        ctx.restore();
      }

      function frame(){
        const { w, h } = resizeCanvasToDisplaySize();
        const now = performance.now();

        if (assetsOk.stones && stonesImg) drawCover(stonesImg, w, h);
        else drawFallback(w,h);

        ctx.save();
        ctx.fillStyle = "rgba(0,0,0,0.22)";
        ctx.fillRect(0,0,w,h);
        ctx.restore();

        updateLadleSpring();
        drawLadle(w,h);
        drawParticles(now);
        drawHUD(w,h);

        requestAnimationFrame(frame);
      }

      function getPointerPos(ev){
        const rect = canvas.getBoundingClientRect();
        const dpr = Math.max(1, Math.min(2.5, window.devicePixelRatio || 1));
        return { x: (ev.clientX - rect.left) * dpr, y: (ev.clientY - rect.top) * dpr };
      }

      function registerTap(px,py){
        if (state !== State.RUNNING) return;

        score++;
        scoreEl.textContent = String(score);

        const now = performance.now();
        const dt = lastTapTs ? (now - lastTapTs) : 999;
        lastTapTs = now;

        const strength = clamp(1 - (dt / 260), 0, 1);
        spawnSplash(px, py, strength);
      }

      canvas.addEventListener("pointerdown", (ev) => {
        if (state !== State.RUNNING) return;
        ev.preventDefault();
        const {x,y} = getPointerPos(ev);
        registerTap(x,y);
      }, { passive: false });

      // Extra iOS guard
      window.addEventListener("touchmove", (e) => {
        if (state === State.RUNNING) e.preventDefault();
      }, { passive: false });

      mainBtn.addEventListener("click", () => {
        if (state === State.READY) return startRound();
        if (state === State.RESULT) {
          state = State.READY;
          return setOverlay(State.READY);
        }
      });

      setInterval(() => { if (state === State.RUNNING) updateTimer(); }, 50);

      // Init
      setBest(getBest());
      setOverlay(State.READY);
      timeLeftEl.textContent = ROUND_SECONDS.toFixed(1) + "s";

      (async () => {
        const a = await loadImage(ASSET_STONES);
        const b = await loadImage(ASSET_LADLE);
        assetsOk.stones = a.ok; assetsOk.ladle = b.ok;
        stonesImg = a.img; ladleImg = b.img;
        frame();
      })();
    })();
  </script>
</body>
</html>
