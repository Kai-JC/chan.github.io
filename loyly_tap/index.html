<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Löyly Tap</title>
  <style>
    :root{
      --bg: #121212;
      --card: #323232;
      --card2: #2b2b2b;
      --border: rgba(255,255,255,0.12);
      --text: #f2f2f2;
      --muted: rgba(242,242,242,0.75);
      --btn: #757575;
      --btnHover: #868686;
      --btnText: #ffffff;
      --shadow: 0 10px 28px rgba(0,0,0,0.55);
      --radius: 12px;
    }

    *{ box-sizing:border-box; }

    html, body { height: 100%; }
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);

      display:flex;
      align-items:center;
      justify-content:center;

      /* Safer centering on iOS Safari */
      padding:
        calc(26px + env(safe-area-inset-top))
        max(14px, env(safe-area-inset-right))
        calc(26px + env(safe-area-inset-bottom))
        max(14px, env(safe-area-inset-left));
    }

    /* Lock scrolling during the round */
    body.locked{
      position: fixed;
      width: 100%;
      overflow: hidden;
      left: 0;
      right: 0;
    }

    .card{
      width: min(820px, 92vw);
      margin: 0 auto;
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 22px 18px 18px;
      border: 1px solid rgba(255,255,255,0.06);
      text-align:center;
    }

    h1{
      margin: 2px 0 8px;
      font-size: 34px;
      font-weight: 800;
      letter-spacing: 0.2px;
    }

    .subtitle{
      margin: 0 auto 14px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
      max-width: 62ch;
    }

    .meta{
      display:flex;
      justify-content:center;
      gap: 18px;
      flex-wrap:wrap;
      margin: 10px 0 14px;
      color: var(--muted);
      font-size: 14px;
    }
    .meta strong{
      color: var(--text);
      font-weight: 900;
    }

    .gameWrap{
      position:relative;
      width: min(640px, 88vw);
      aspect-ratio: 1 / 1;
      border-radius: 14px;
      overflow:hidden;
      margin: 10px auto 14px; /* force centered */
      border: 1px solid var(--border);
      background: #0b0b0b;
    }

    canvas{
      width:100%;
      height:100%;
      display:block;

      /* important: stop scroll/drag while tapping on canvas */
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;

      cursor:pointer;
    }

    .overlay{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 16px;
      background: rgba(0,0,0,0.55);
      pointer-events:auto;
    }
    .overlay.hidden{ display:none; }

    .panel{
      width: min(520px, 92vw);
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      text-align:left;
      box-shadow: 0 10px 22px rgba(0,0,0,0.35);
    }
    .panel h2{
      margin:0 0 6px;
      font-size: 16px;
      font-weight: 800;
      color: var(--text);
    }
    .panel p{
      margin:0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .row{
      display:flex;
      justify-content:flex-end;
      gap: 10px;
      margin-top: 12px;
    }

    button{
      appearance:none;
      border: none;
      background: var(--btn);
      color: var(--btnText);
      padding: 10px 14px;
      border-radius: 8px;
      font-weight: 750;
      cursor:pointer;
      user-select:none;
      touch-action: manipulation;
    }
    button:hover{ background: var(--btnHover); }
    button:active{ transform: translateY(1px); }

    /* Best score bigger + centered */
    .bestLine{
      width: min(640px, 88vw);
      margin: 6px auto 0;
      text-align:center;
      border-top: 1px solid rgba(255,255,255,0.10);
      padding-top: 14px;
      color: var(--muted);
      font-size: 16px;
    }
    .bestLine strong{
      display:inline-block;
      color: var(--text);
      font-weight: 900;
      font-size: 26px;
      margin-left: 8px;
    }

    .foot{
      margin-top: 16px;
      color: rgba(242,242,242,0.55);
      font-size: 12px;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Löyly Tap</h1>
    <p class="subtitle">Tap as fast as you can for <strong>10 seconds</strong>. Your best score is saved on this device.</p>

    <div class="meta" aria-live="polite">
      <div>Time: <strong id="timeLeft">10.0s</strong></div>
      <div>Score: <strong id="score">0</strong></div>
    </div>

    <div class="gameWrap">
      <canvas id="c" width="900" height="900" aria-label="Tap to splash löyly"></canvas>

      <div class="overlay" id="overlay">
        <div class="panel">
          <h2 id="overlayTitle">Ready?</h2>
          <p id="overlayMsg">Press Start, then tap the stones as fast as you can for 10 seconds.</p>
          <div class="row">
            <button id="mainBtn">Start</button>
          </div>
        </div>
      </div>
    </div>

    <div class="bestLine">Best:<strong id="bestScore">0</strong></div>
    <div class="foot">© 2026 Kai Chan. All rights reserved.</div>
  </div>

  <script>
    (() => {
      const ROUND_SECONDS = 10;
      const STORAGE_KEY_BEST = "loylyTapBestScore_v2";

      const ASSET_STONES = "stones.jpg";
      const ASSET_LADLE  = "ladle.png";

      const timeLeftEl = document.getElementById("timeLeft");
      const scoreEl = document.getElementById("score");
      const bestScoreEl = document.getElementById("bestScore");

      const overlay = document.getElementById("overlay");
      const overlayTitle = document.getElementById("overlayTitle");
      const overlayMsg = document.getElementById("overlayMsg");
      const mainBtn = document.getElementById("mainBtn");

      const canvas = document.getElementById("c");
      const ctx = canvas.getContext("2d");

      function clamp(n,a,b){ return Math.max(a, Math.min(b,n)); }
      function rnd(a,b){ return a + Math.random()*(b-a); }

      function resizeCanvasToDisplaySize() {
        const dpr = Math.max(1, Math.min(2.5, window.devicePixelRatio || 1));
        const rect = canvas.getBoundingClientRect();
        const w = Math.floor(rect.width * dpr);
        const h = Math.floor(rect.height * dpr);
        if (canvas.width !== w || canvas.height !== h) {
          canvas.width = w;
          canvas.height = h;
        }
        return { dpr, w, h };
      }

      function loadImage(src){
        return new Promise((resolve) => {
          const img = new Image();
          img.onload = () => resolve({ ok:true, img });
          img.onerror = () => resolve({ ok:false, img:null });
          img.src = src;
        });
      }

      let stonesImg = null;
      let ladleImg = null;
      let assetsOk = { stones:false, ladle:false };

      function getBest(){
        const raw = localStorage.getItem(STORAGE_KEY_BEST);
        const n = raw ? Number(raw) : 0;
        return Number.isFinite(n) && n >= 0 ? Math.floor(n) : 0;
      }
      function setBest(n){
        localStorage.setItem(STORAGE_KEY_BEST, String(Math.floor(n)));
        bestScoreEl.textContent = String(Math.floor(n));
      }

      const State = { READY:"READY", RUNNING:"RUNNING", RESULT:"RESULT" };
      let state = State.READY;

      let score = 0;
      let startTs = 0;
      let lastTapTs = 0;

      // Flick-up ladle
      let ladleKick = 0;
      let ladleKickVel = 0;

      // Particles
      const droplets = [];
      const steams = [];
      const rings = []; // expanding splash rings

      // Scroll lock (iOS safe)
      let savedScrollY = 0;
      function lockScroll(){
        savedScrollY = window.scrollY || 0;
        document.body.classList.add("locked");
        document.body.style.top = `-${savedScrollY}px`;
      }
      function unlockScroll(){
        document.body.classList.remove("locked");
        const top = document.body.style.top;
        document.body.style.top = "";
        const y = top ? -parseInt(top, 10) : savedScrollY;
        window.scrollTo(0, y || 0);
      }

      function setOverlay(mode, data){
        overlay.classList.remove("hidden");

        if (mode === State.READY){
          overlayTitle.textContent = "Ready?";
          overlayMsg.textContent = "Press Start, then tap the stones as fast as you can for 10 seconds.";
          mainBtn.textContent = "Start";
        }

        if (mode === State.RESULT){
          overlayTitle.textContent = "Time!";
          overlayMsg.textContent = data.message;
          mainBtn.textContent = "Play again";
        }

        if (mode === State.RUNNING){
          overlay.classList.add("hidden");
        }
      }

      function startRound(){
        score = 0;
        scoreEl.textContent = "0";
        startTs = performance.now();
        timeLeftEl.textContent = ROUND_SECONDS.toFixed(1) + "s";
        lastTapTs = 0;

        droplets.length = 0;
        steams.length = 0;
        rings.length = 0;
        ladleKick = 0;
        ladleKickVel = 0;

        state = State.RUNNING;
        lockScroll();
        setOverlay(State.RUNNING);
      }

      function endRound(){
        timeLeftEl.textContent = "0.0s";
        unlockScroll();

        const best = getBest();
        if (score > best){
          setBest(score);
          setOverlay(State.RESULT, { message: `New best score: ${score}. Nice.` });
        } else if (best > 0) {
          setOverlay(State.RESULT, { message: `You scored ${score}. Your best is ${best}.` });
        } else {
          setOverlay(State.RESULT, { message: `You scored ${score}.` });
        }

        state = State.RESULT;
      }

      function updateTimer(){
        if (state !== State.RUNNING) return;
        const elapsed = (performance.now() - startTs) / 1000;
        const remaining = clamp(ROUND_SECONDS - elapsed, 0, ROUND_SECONDS);
        timeLeftEl.textContent = remaining.toFixed(1) + "s";
        if (remaining <= 0) endRound();
      }

      function drawCover(img, w, h){
        const iw = img.width, ih = img.height;
        const s = Math.max(w / iw, h / ih);
        const dw = iw * s, dh = ih * s;
        const dx = (w - dw) / 2;
        const dy = (h - dh) / 2;
        ctx.drawImage(img, dx, dy, dw, dh);
      }

      function drawFallback(w,h){
        const g = ctx.createLinearGradient(0,0,0,h);
        g.addColorStop(0, "#0b0b0b");
        g.addColorStop(1, "#050505");
        ctx.fillStyle = g;
        ctx.fillRect(0,0,w,h);
      }

      function spawnSplash(x,y, strength){
        // Bigger splash: more + larger droplets
        const n = Math.floor(22 + strength*28);
        for (let i=0;i<n;i++){
          const a = rnd(-Math.PI*0.95, -Math.PI*0.05);
          const sp = rnd(3.2, 8.4) * (0.9 + strength*1.0);
          droplets.push({
            x, y,
            vx: Math.cos(a)*sp + rnd(-1.3,1.3),
            vy: Math.sin(a)*sp,
            r: rnd(3.2, 8.2),
            life: rnd(520, 980),
            born: performance.now()
          });
        }

        const sn = Math.floor(3 + strength*4);
        for (let i=0;i<sn;i++){
          steams.push({
            x: x + rnd(-28,28),
            y: y + rnd(-12,12),
            vx: rnd(-0.22,0.22),
            vy: rnd(-0.70,-0.35),
            r: rnd(22, 44),
            life: rnd(900, 1500),
            born: performance.now()
          });
        }

        // Expanding ring for “impact”
        rings.push({
          x, y,
          born: performance.now(),
          life: 280 + strength*120,
          r0: 10,
          r1: 70 + strength*70
        });

        ladleKickVel += 0.95 + strength*0.85;
      }

      function drawParticles(now){
        // Ring first (under droplets)
        for (let i=rings.length-1;i>=0;i--){
          const r = rings[i];
          const t = (now - r.born) / r.life;
          if (t >= 1){ rings.splice(i,1); continue; }
          const rr = r.r0 + (r.r1 - r.r0) * t;
          ctx.save();
          ctx.globalAlpha = (1 - t) * 0.45;
          ctx.lineWidth = 3;
          ctx.strokeStyle = "rgba(200,230,255,0.9)";
          ctx.beginPath();
          ctx.arc(r.x, r.y, rr, 0, Math.PI*2);
          ctx.stroke();
          ctx.restore();
        }

        // Droplets
        for (let i=droplets.length-1;i>=0;i--){
          const d = droplets[i];
          const age = now - d.born;
          const t = age / d.life;
          if (t >= 1){ droplets.splice(i,1); continue; }
          d.x += d.vx;
          d.y += d.vy;
          d.vy += 0.24;
          d.vx *= 0.992;

          const alpha = 1 - t;
          ctx.save();
          ctx.globalAlpha = 0.75 * alpha;
          const g = ctx.createRadialGradient(d.x-d.r*0.25, d.y-d.r*0.25, 1, d.x, d.y, d.r*2.1);
          g.addColorStop(0, "rgba(255,255,255,0.65)");
          g.addColorStop(0.25, "rgba(170,220,255,0.45)");
          g.addColorStop(1, "rgba(120,170,210,0)");
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.arc(d.x, d.y, d.r*1.25, 0, Math.PI*2);
          ctx.fill();
          ctx.restore();
        }

        // Steam
        for (let i=steams.length-1;i>=0;i--){
          const s = steams[i];
          const age = now - s.born;
          const t = age / s.life;
          if (t >= 1){ steams.splice(i,1); continue; }
          s.x += s.vx;
          s.y += s.vy;
          s.r += 0.07;

          const alpha = (1 - t) * 0.60;
          ctx.save();
          ctx.globalAlpha = alpha;
          const g = ctx.createRadialGradient(s.x, s.y, 1, s.x, s.y, s.r);
          g.addColorStop(0, "rgba(255,255,255,0.22)");
          g.addColorStop(1, "rgba(255,255,255,0)");
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
          ctx.fill();
          ctx.restore();
        }
      }

      function updateLadleSpring(){
        ladleKickVel -= ladleKick * 0.26;
        ladleKickVel *= 0.78;
        ladleKick += ladleKickVel * 0.06;
        ladleKick = clamp(ladleKick, 0, 1.2);
        if (ladleKick < 0.001) ladleKick = 0;
      }

      function drawLadle(w,h){
        const baseX = w * 0.76;
        const baseY = h * 0.28;

        const kick = ladleKick;
        const rot = -0.55 + kick * 0.55;   // flick up
        const tx  = -kick * (w * 0.020);
        const ty  = -kick * (h * 0.055);
        const sc  = 1 + kick * 0.06;
        const size = Math.min(w,h) * 0.56;

        ctx.save();
        ctx.translate(baseX + tx, baseY + ty);
        ctx.rotate(rot);
        ctx.scale(sc, sc);

        if (assetsOk.ladle && ladleImg){
          ctx.shadowColor = "rgba(0,0,0,0.45)";
          ctx.shadowBlur = 16;
          ctx.drawImage(ladleImg, -size*0.58, -size*0.18, size, size);
        }
        ctx.restore();
      }

      function drawHUD(w,h){
        if (state !== State.RUNNING) return;
        ctx.save();
        ctx.globalAlpha = 0.95;
        ctx.fillStyle = "rgba(255,255,255,0.92)";
        ctx.font = `${Math.floor(h*0.045)}px system-ui, -apple-system, Segoe UI, Roboto, Arial`;
        ctx.textAlign = "left";
        ctx.fillText(`Score: ${score}`, w*0.04, h*0.10);
        ctx.textAlign = "right";
        ctx.fillText(`Time: ${timeLeftEl.textContent}`, w*0.96, h*0.10);
        ctx.restore();
      }

      function frame(){
        const { w, h } = resizeCanvasToDisplaySize();
        const now = performance.now();

        if (assetsOk.stones && stonesImg) drawCover(stonesImg, w, h);
        else drawFallback(w,h);

        ctx.save();
        ctx.fillStyle = "rgba(0,0,0,0.22)";
        ctx.fillRect(0,0,w,h);
        ctx.restore();

        updateLadleSpring();
        drawLadle(w,h);
        drawParticles(now);
        drawHUD(w,h);

        requestAnimationFrame(frame);
      }

      function getPointerPos(ev){
        const rect = canvas.getBoundingClientRect();
        const dpr = Math.max(1, Math.min(2.5, window.devicePixelRatio || 1));
        return { x: (ev.clientX - rect.left) * dpr, y: (ev.clientY - rect.top) * dpr };
      }

      function registerTap(px,py){
        if (state !== State.RUNNING) return;

        score++;
        scoreEl.textContent = String(score);

        const now = performance.now();
        const dt = lastTapTs ? (now - lastTapTs) : 999;
        lastTapTs = now;

        const strength = clamp(1 - (dt / 260), 0, 1);
        spawnSplash(px, py, strength);
      }

      canvas.addEventListener("pointerdown", (ev) => {
        if (state !== State.RUNNING) return;
        ev.preventDefault();
        const {x,y} = getPointerPos(ev);
        registerTap(x,y);
      }, { passive: false });

      // Also prevent touchmove while running (extra iOS guard)
      window.addEventListener("touchmove", (e) => {
        if (state === State.RUNNING) e.preventDefault();
      }, { passive: false });

      mainBtn.addEventListener("click", () => {
        if (state === State.READY) return startRound();
        if (state === State.RESULT) {
          state = State.READY;
          return setOverlay(State.READY);
        }
      });

      setInterval(() => { if (state === State.RUNNING) updateTimer(); }, 50);

      // Init
      setBest(getBest());
      setOverlay(State.READY);
      timeLeftEl.textContent = ROUND_SECONDS.toFixed(1) + "s";

      (async () => {
        const a = await loadImage(ASSET_STONES);
        const b = await loadImage(ASSET_LADLE);
        assetsOk.stones = a.ok; assetsOk.ladle = b.ok;
        stonesImg = a.img; ladleImg = b.img;
        frame();
      })();
    })();
  </script>
</body>
</html>
