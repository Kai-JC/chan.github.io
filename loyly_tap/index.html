<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Löyly Tap" />
  <meta name="theme-color" content="#121212" />
  <title>Löyly Tap</title>

  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />

  <style>
    .container { max-width: 600px; }

    .gameWrap{
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 8px;
      overflow: hidden;
      margin-top: 14px;
      border: 1px solid #333;
      background: #0b0b0b;
    }

    canvas{
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }

    /* Ready overlay (ONLY used on initial load) */
    .overlay{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 14px;
      background: rgba(0,0,0,0.55);
      pointer-events:auto;
      z-index: 5;
    }
    .overlay.hidden{ display:none; }

    .panel{
      width: 100%;
      max-width: 520px;
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 16px 14px;
      text-align: center;
      box-shadow: 0 4px 6px rgba(0,0,0,0.5);
    }
    .panel h2{
      font-size: 1.3em;
      margin: 0 0 14px;
      color: #e0e0e0;
    }

    .gameBtn{
      display:inline-block;
      padding: 10px 16px;
      background: #808080;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-weight: bold;
      font-size: 0.95em;
      cursor: pointer;
      transition: background 0.2s ease-in-out, color 0.2s ease-in-out, transform 0.12s ease-in-out;
      min-width: 160px;
    }
    .gameBtn:hover{
      background: #666666;
      color: #42a5f5;
    }
    .gameBtn:active{ transform: translateY(1px); }

    .hud{
      margin-top: 10px;
      display:flex;
      justify-content:center;
      gap: 18px;
      color:#9e9e9e;
      font-size: 1.05em;
    }
    .hud strong{ color:#e0e0e0; }

    .bestLine{
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid #333;
      color:#9e9e9e;
      font-size: 1.05em;
      text-align:center;
    }
    .bestLine strong{ color:#e0e0e0; font-weight:700; }

    body.locked{
      position: fixed;
      overflow: hidden;
      width: 100%;
      left: 0;
      right: 0;
    }

    /* Result modal (used after each game) */
    .result{
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 14px;
      background: rgba(0,0,0,0.45);
    }
    .result.show{ display:flex; }

    .resultCard{
      width: min(520px, 92vw);
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 16px 14px;
      text-align: center;
      box-shadow: 0 10px 22px rgba(0,0,0,0.55);
      transform: translateY(10px) scale(0.96);
      opacity: 0;
      animation: popIn 420ms cubic-bezier(.2,.9,.25,1.2) forwards;
    }
    .resultCard h3{
      margin: 0 0 6px;
      font-size: 1.35em;
      color: #e0e0e0;
    }
    .resultCard p{
      margin: 0;
      color: #9e9e9e;
      line-height: 1.5;
    }
    .pill{
      display:inline-block;
      margin-top: 10px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(66,165,245,0.14);
      color: #42a5f5;
      font-weight: 700;
      border: 1px solid rgba(66,165,245,0.28);
    }
    .resultActions{
      margin-top: 14px;
      display:flex;
      justify-content:center;
    }

    @keyframes popIn{
      0%   { transform: translateY(12px) scale(0.95); opacity: 0; }
      60%  { transform: translateY(-2px) scale(1.02); opacity: 1; }
      100% { transform: translateY(0px) scale(1.00); opacity: 1; }
    }

    /* Confetti canvas */
    #confetti{
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: none;
      z-index: 9998;
      pointer-events: none;
    }
    #confetti.show{ display:block; }

    /* Sad emoji rain canvas */
    #sadRain{
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: none;
      z-index: 9997;
      pointer-events: none;
    }
    #sadRain.show{ display:block; }
  </style>
</head>

<body>
  <header>
    <div class="container header-container">
      <h1>Löyly Tap</h1>
      <p style="color:#9e9e9e; margin-top:8px;">
        Tap as fast as you can for <strong style="color:#e0e0e0;">10 seconds</strong>. Your best score is saved on this device.
      </p>

      <div class="hud" aria-live="polite">
        <div>Time: <strong id="timeLeft">10.0s</strong></div>
        <div>Score: <strong id="score">0</strong></div>
      </div>

      <div class="gameWrap">
        <canvas id="c" width="900" height="900" aria-label="Tap to splash löyly"></canvas>

        <!-- Only shown on first load (Ready + Start) -->
        <div class="overlay" id="readyOverlay">
          <div class="panel">
            <h2>Ready?</h2>
            <button class="gameBtn" id="startBtn">Start</button>
          </div>
        </div>
      </div>

      <div class="bestLine">Best: <strong id="bestScore">0</strong></div>
    </div>
  </header>

  <footer>
    <div class="container">
      <p>&copy; <span id="year"></span> Kai Chan. All rights reserved.</p>
    </div>
  </footer>

  <canvas id="confetti"></canvas>
  <canvas id="sadRain"></canvas>

  <!-- Result modal (both win/lose) -->
  <div class="result" id="resultModal" role="dialog" aria-live="polite">
    <div class="resultCard">
      <h3 id="resultTitle">Time!</h3>
      <p id="resultText">You scored 0.</p>
      <div class="pill" id="resultPill" style="display:none;">Best: 0</div>
      <div class="resultActions">
        <button class="gameBtn" id="playAgainBtn">Play again?</button>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    (() => {
      const ROUND_SECONDS = 10;
      const STORAGE_KEY_BEST = "loylyTapBestScore_v6";

      const ASSET_STONES = "stones.jpg";
      const ASSET_LADLE  = "ladle.png";

      const timeLeftEl = document.getElementById("timeLeft");
      const scoreEl = document.getElementById("score");
      const bestScoreEl = document.getElementById("bestScore");

      const readyOverlay = document.getElementById("readyOverlay");
      const startBtn = document.getElementById("startBtn");

      const resultModal = document.getElementById("resultModal");
      const resultTitle = document.getElementById("resultTitle");
      const resultText = document.getElementById("resultText");
      const resultPill = document.getElementById("resultPill");
      const playAgainBtn = document.getElementById("playAgainBtn");

      const canvas = document.getElementById("c");
      const ctx = canvas.getContext("2d");

      function clamp(n,a,b){ return Math.max(a, Math.min(b,n)); }
      function rnd(a,b){ return a + Math.random()*(b-a); }

      function resizeCanvasToDisplaySize() {
        const dpr = Math.max(1, Math.min(2.5, window.devicePixelRatio || 1));
        const rect = canvas.getBoundingClientRect();
        const w = Math.floor(rect.width * dpr);
        const h = Math.floor(rect.height * dpr);
        if (canvas.width !== w || canvas.height !== h) {
          canvas.width = w;
          canvas.height = h;
        }
        return { dpr, w, h };
      }

      function loadImage(src){
        return new Promise((resolve) => {
          const img = new Image();
          img.onload = () => resolve({ ok:true, img });
          img.onerror = () => resolve({ ok:false, img:null });
          img.src = src;
        });
      }

      let stonesImg = null;
      let ladleImg = null;
      let assetsOk = { stones:false, ladle:false };

      function getBest(){
        const raw = localStorage.getItem(STORAGE_KEY_BEST);
        const n = raw ? Number(raw) : 0;
        return Number.isFinite(n) && n >= 0 ? Math.floor(n) : 0;
      }
      function setBest(n){
        localStorage.setItem(STORAGE_KEY_BEST, String(Math.floor(n)));
        bestScoreEl.textContent = String(Math.floor(n));
      }

      const State = { READY:"READY", RUNNING:"RUNNING", RESULT:"RESULT" };
      let state = State.READY;

      let score = 0;
      let startTs = 0;
      let lastTapTs = 0;

      // Flick-up ladle
      let ladleKick = 0;
      let ladleKickVel = 0;

      // Bigger splash particles
      const droplets = [];
      const steams = [];
      const rings = [];

      // Scroll lock
      let savedScrollY = 0;
      function lockScroll(){
        savedScrollY = window.scrollY || 0;
        document.body.classList.add("locked");
        document.body.style.top = `-${savedScrollY}px`;
      }
      function unlockScroll(){
        document.body.classList.remove("locked");
        const top = document.body.style.top;
        document.body.style.top = "";
        const y = top ? -parseInt(top, 10) : savedScrollY;
        window.scrollTo(0, y || 0);
      }

      function showResultModal({ title, text, showBestPill, bestValue }){
        resultTitle.textContent = title;
        resultText.textContent = text;

        if (showBestPill){
          resultPill.style.display = "inline-block";
          resultPill.textContent = `Best: ${bestValue}`;
        } else {
          resultPill.style.display = "none";
        }

        resultModal.classList.add("show");
      }
      function hideResultModal(){
        resultModal.classList.remove("show");
      }

      // Confetti
      const confettiCanvas = document.getElementById("confetti");
      const cctx = confettiCanvas.getContext("2d");
      let confettiPieces = [];
      let confettiOn = false;
      let confettiStart = 0;

      function resizeConfetti(){
        const dpr = Math.max(1, Math.min(2.5, window.devicePixelRatio || 1));
        confettiCanvas.width = Math.floor(window.innerWidth * dpr);
        confettiCanvas.height = Math.floor(window.innerHeight * dpr);
        cctx.setTransform(dpr,0,0,dpr,0,0);
      }
      window.addEventListener("resize", () => { resizeConfetti(); resizeSad(); });

      function burstConfetti(){
        resizeConfetti();
        confettiPieces = [];
        const W = window.innerWidth;
        const H = window.innerHeight;
        const count = 160;

        for (let i=0;i<count;i++){
          confettiPieces.push({
            x: W*0.5 + rnd(-90,90),
            y: H*0.35 + rnd(-50,50),
            vx: rnd(-6.8, 6.8),
            vy: rnd(-11.0, -4.8),
            g: rnd(0.18, 0.30),
            w: rnd(6, 12),
            h: rnd(10, 16),
            rot: rnd(0, Math.PI),
            vr: rnd(-0.20, 0.20),
            life: rnd(1100, 1700),
            born: performance.now(),
            col: [
              "rgba(66,165,245,0.95)",
              "rgba(255,255,255,0.85)",
              "rgba(160,160,160,0.85)",
              "rgba(120,200,255,0.85)"
            ][Math.floor(rnd(0,4))]
          });
        }

        confettiOn = true;
        confettiStart = performance.now();
        confettiCanvas.classList.add("show");
        requestAnimationFrame(confettiFrame);
      }

      function confettiFrame(now){
        if (!confettiOn) return;

        const W = window.innerWidth;
        const H = window.innerHeight;
        cctx.clearRect(0,0,W,H);

        let alive = 0;
        for (const p of confettiPieces){
          const t = now - p.born;
          if (t >= p.life) continue;
          alive++;

          p.x += p.vx;
          p.y += p.vy;
          p.vy += p.g;
          p.vx *= 0.992;
          p.rot += p.vr;

          const fade = 1 - (t / p.life);
          cctx.save();
          cctx.globalAlpha = Math.max(0, fade) * 0.95;
          cctx.translate(p.x, p.y);
          cctx.rotate(p.rot);
          cctx.fillStyle = p.col;
          cctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
          cctx.restore();
        }

        if (alive === 0 || (now - confettiStart) > 1750){
          confettiOn = false;
          confettiCanvas.classList.remove("show");
          cctx.clearRect(0,0,W,H);
          return;
        }

        requestAnimationFrame(confettiFrame);
      }

      // Sad emoji rain (pour down)
      const sadCanvas = document.getElementById("sadRain");
      const sctx = sadCanvas.getContext("2d");
      let sadOn = false;
      let sadPieces = [];
      let sadStart = 0;

      function resizeSad(){
        const dpr = Math.max(1, Math.min(2.5, window.devicePixelRatio || 1));
        sadCanvas.width = Math.floor(window.innerWidth * dpr);
        sadCanvas.height = Math.floor(window.innerHeight * dpr);
        sctx.setTransform(dpr,0,0,dpr,0,0);
        sctx.font = "26px Roboto, system-ui, -apple-system, Segoe UI, Arial";
      }

      function startSadRain(){
        resizeSad();
        sadPieces = [];
        const W = window.innerWidth;
        const count = 36;
        for (let i=0;i<count;i++){
          sadPieces.push({
            x: rnd(0, W),
            y: rnd(-220, -20),
            vy: rnd(2.2, 4.8),
            vx: rnd(-0.3, 0.3),
            rot: rnd(-0.12, 0.12),
            a: rnd(0.55, 0.9),
            born: performance.now(),
            life: rnd(900, 1400),
            emoji: "😢"
          });
        }
        sadOn = true;
        sadStart = performance.now();
        sadCanvas.classList.add("show");
        requestAnimationFrame(sadFrame);
      }

      function sadFrame(now){
        if (!sadOn) return;

        const W = window.innerWidth;
        const H = window.innerHeight;
        sctx.clearRect(0,0,W,H);

        let alive = 0;
        for (const p of sadPieces){
          const t = now - p.born;
          if (t >= p.life) continue;
          alive++;

          p.x += p.vx;
          p.y += p.vy;

          const fade = 1 - (t / p.life);
          sctx.save();
          sctx.globalAlpha = p.a * Math.max(0, fade);
          sctx.translate(p.x, p.y);
          sctx.rotate(p.rot);
          sctx.fillText(p.emoji, 0, 0);
          sctx.restore();
        }

        if (alive === 0 || (now - sadStart) > 4400){
          sadOn = false;
          sadCanvas.classList.remove("show");
          sctx.clearRect(0,0,W,H);
          return;
        }

        requestAnimationFrame(sadFrame);
      }

      function startRound(){
        hideResultModal();

        score = 0;
        scoreEl.textContent = "0";
        startTs = performance.now();
        timeLeftEl.textContent = ROUND_SECONDS.toFixed(1) + "s";
        lastTapTs = 0;

        droplets.length = 0;
        steams.length = 0;
        rings.length = 0;
        ladleKick = 0;
        ladleKickVel = 0;

        state = State.RUNNING;
        lockScroll();

        // hide ready overlay after first start
        readyOverlay.classList.add("hidden");
      }

      function endRound(){
        timeLeftEl.textContent = "0.0s";
        unlockScroll();

        const best = getBest();
        const isNewBest = score > best;

        if (isNewBest){
          setBest(score);
          burstConfetti();
          showResultModal({
            title: "New High Score!",
            text: `You hit ${score} taps.`,
            showBestPill: true,
            bestValue: score
          });
        } else {
          startSadRain();
          showResultModal({
            title: "No high score! 😢😢😢",
            text: `You scored ${score}. Your best is ${best}.`,
            showBestPill: true,
            bestValue: best
          });
        }

        state = State.RESULT;
      }

      function updateTimer(){
        if (state !== State.RUNNING) return;
        const elapsed = (performance.now() - startTs) / 1000;
        const remaining = clamp(ROUND_SECONDS - elapsed, 0, ROUND_SECONDS);
        timeLeftEl.textContent = remaining.toFixed(1) + "s";
        if (remaining <= 0) endRound();
      }

      function drawCover(img, w, h){
        const iw = img.width, ih = img.height;
        const s = Math.max(w / iw, h / ih);
        const dw = iw * s, dh = ih * s;
        const dx = (w - dw) / 2;
        const dy = (h - dh) / 2;
        ctx.drawImage(img, dx, dy, dw, dh);
      }

      function drawFallback(w,h){
        const g = ctx.createLinearGradient(0,0,0,h);
        g.addColorStop(0, "#0b0b0b");
        g.addColorStop(1, "#050505");
        ctx.fillStyle = g;
        ctx.fillRect(0,0,w,h);
      }

      function spawnSplash(x,y, strength){
        rings.push({ x, y, born: performance.now(), life: 320 + strength*180, r0: 18, r1: 120 + strength*120 });

        const n = Math.floor(28 + strength*34);
        for (let i=0;i<n;i++){
          const a = rnd(-Math.PI*0.95, -Math.PI*0.05);
          const sp = rnd(3.6, 9.6) * (1.0 + strength*1.1);
          droplets.push({ x, y, vx: Math.cos(a)*sp + rnd(-1.4,1.4), vy: Math.sin(a)*sp, r: rnd(3.8, 9.8), life: rnd(600, 1050), born: performance.now() });
        }

        const sn = Math.floor(4 + strength*4);
        for (let i=0;i<sn;i++){
          steams.push({ x: x + rnd(-34,34), y: y + rnd(-14,14), vx: rnd(-0.24,0.24), vy: rnd(-0.78,-0.40), r: rnd(26, 52), life: rnd(950, 1650), born: performance.now() });
        }

        ladleKickVel += 1.05 + strength*0.90;
      }

      function drawParticles(now){
        for (let i=rings.length-1;i>=0;i--){
          const r = rings[i];
          const t = (now - r.born) / r.life;
          if (t >= 1){ rings.splice(i,1); continue; }
          const rr = r.r0 + (r.r1 - r.r0) * t;
          ctx.save();
          ctx.globalAlpha = (1 - t) * 0.42;
          ctx.lineWidth = 3;
          ctx.strokeStyle = "rgba(200,230,255,0.9)";
          ctx.beginPath();
          ctx.arc(r.x, r.y, rr, 0, Math.PI*2);
          ctx.stroke();
          ctx.restore();
        }

        for (let i=droplets.length-1;i>=0;i--){
          const d = droplets[i];
          const age = now - d.born;
          const t = age / d.life;
          if (t >= 1){ droplets.splice(i,1); continue; }
          d.x += d.vx; d.y += d.vy;
          d.vy += 0.25; d.vx *= 0.992;

          const alpha = 1 - t;
          ctx.save();
          ctx.globalAlpha = 0.78 * alpha;
          const g = ctx.createRadialGradient(d.x-d.r*0.25, d.y-d.r*0.25, 1, d.x, d.y, d.r*2.2);
          g.addColorStop(0, "rgba(255,255,255,0.65)");
          g.addColorStop(0.25, "rgba(170,220,255,0.45)");
          g.addColorStop(1, "rgba(120,170,210,0)");
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.arc(d.x, d.y, d.r*1.25, 0, Math.PI*2);
          ctx.fill();
          ctx.restore();
        }

        for (let i=steams.length-1;i>=0;i--){
          const s = steams[i];
          const age = now - s.born;
          const t = age / s.life;
          if (t >= 1){ steams.splice(i,1); continue; }
          s.x += s.vx; s.y += s.vy; s.r += 0.07;

          const alpha = (1 - t) * 0.60;
          ctx.save();
          ctx.globalAlpha = alpha;
          const g = ctx.createRadialGradient(s.x, s.y, 1, s.x, s.y, s.r);
          g.addColorStop(0, "rgba(255,255,255,0.22)");
          g.addColorStop(1, "rgba(255,255,255,0)");
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
          ctx.fill();
          ctx.restore();
        }
      }

      function updateLadleSpring(){
        ladleKickVel -= ladleKick * 0.26;
        ladleKickVel *= 0.78;
        ladleKick += ladleKickVel * 0.06;
        ladleKick = clamp(ladleKick, 0, 1.2);
        if (ladleKick < 0.001) ladleKick = 0;
      }

      function drawLadle(w,h){
        const baseX = w * 0.76;
        const baseY = h * 0.28;

        const kick = ladleKick;
        const rot = -0.55 + kick * 0.55;
        const tx  = -kick * (w * 0.020);
        const ty  = -kick * (h * 0.055);
        const sc  = 1 + kick * 0.06;
        const size = Math.min(w,h) * 0.56;

        ctx.save();
        ctx.translate(baseX + tx, baseY + ty);
        ctx.rotate(rot);
        ctx.scale(sc, sc);

        if (assetsOk.ladle && ladleImg){
          ctx.shadowColor = "rgba(0,0,0,0.45)";
          ctx.shadowBlur = 16;
          ctx.drawImage(ladleImg, -size*0.58, -size*0.18, size, size);
        }
        ctx.restore();
      }

      function drawHUD(w,h){
        if (state !== State.RUNNING) return;
        ctx.save();
        ctx.globalAlpha = 0.95;
        ctx.fillStyle = "rgba(255,255,255,0.92)";
        ctx.font = `${Math.floor(h*0.045)}px Roboto, system-ui, -apple-system, Segoe UI, Arial`;
        ctx.textAlign = "left";
        ctx.fillText(`Score: ${score}`, w*0.04, h*0.10);
        ctx.textAlign = "right";
        ctx.fillText(`Time: ${timeLeftEl.textContent}`, w*0.96, h*0.10);
        ctx.restore();
      }

      function frame(){
        const { w, h } = resizeCanvasToDisplaySize();
        const now = performance.now();

        if (assetsOk.stones && stonesImg) drawCover(stonesImg, w, h);
        else drawFallback(w,h);

        ctx.save();
        ctx.fillStyle = "rgba(0,0,0,0.22)";
        ctx.fillRect(0,0,w,h);
        ctx.restore();

        updateLadleSpring();
        drawLadle(w,h);
        drawParticles(now);
        drawHUD(w,h);

        requestAnimationFrame(frame);
      }

      function getPointerPos(ev){
        const rect = canvas.getBoundingClientRect();
        const dpr = Math.max(1, Math.min(2.5, window.devicePixelRatio || 1));
        return { x: (ev.clientX - rect.left) * dpr, y: (ev.clientY - rect.top) * dpr };
      }

      function registerTap(px,py){
        if (state !== State.RUNNING) return;

        score++;
        scoreEl.textContent = String(score);

        const now = performance.now();
        const dt = lastTapTs ? (now - lastTapTs) : 999;
        lastTapTs = now;

        const strength = clamp(1 - (dt / 260), 0, 1);
        spawnSplash(px, py, strength);
      }

      canvas.addEventListener("pointerdown", (ev) => {
        if (state !== State.RUNNING) return;
        ev.preventDefault();
        const {x,y} = getPointerPos(ev);
        registerTap(x,y);
      }, { passive: false });

      window.addEventListener("touchmove", (e) => {
        if (state === State.RUNNING) e.preventDefault();
      }, { passive: false });

      startBtn.addEventListener("click", () => startRound());
      playAgainBtn.addEventListener("click", () => startRound());

      setInterval(() => { if (state === State.RUNNING) updateTimer(); }, 50);

      // Init
      setBest(getBest());
      timeLeftEl.textContent = ROUND_SECONDS.toFixed(1) + "s";

      (async () => {
        const a = await loadImage(ASSET_STONES);
        const b = await loadImage(ASSET_LADLE);
        assetsOk.stones = a.ok; assetsOk.ladle = b.ok;
        stonesImg = a.img; ladleImg = b.img;
        frame();
      })();
    })();
  </script>
</body>
</html>
